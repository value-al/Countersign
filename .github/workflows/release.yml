name: Release

# Publishes to NuGet and creates a GitHub Release when a v* tag is pushed:
#   git tag v0.1.0-alpha && git push origin v0.1.0-alpha
# Requires the repository secret NUGET_API_KEY.

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - run: dotnet restore
      - run: dotnet build --no-restore -c Release
      - name: Test (net8.0)
        run: dotnet test --no-build -c Release -f net8.0

      - name: Pack
        run: dotnet pack --no-build -c Release -o artifacts

      - name: Push to NuGet
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.nupkg
